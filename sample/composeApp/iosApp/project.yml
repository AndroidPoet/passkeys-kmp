name: iosApp
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    # Override at build time with your own id + team, e.g.:
    #   xcodebuild ... PRODUCT_BUNDLE_IDENTIFIER=com.your.app DEVELOPMENT_TEAM=XXXXXXXXXX
    PRODUCT_BUNDLE_IDENTIFIER: com.example.passkeys.sample
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_ENTITLEMENTS: iosApp/iosApp.entitlements
    # DEVELOPMENT_TEAM is supplied at build time (xcodebuild DEVELOPMENT_TEAM=...)
    # so the team id is never committed.
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    settings:
      base:
        FRAMEWORK_SEARCH_PATHS: $(SRCROOT)/../build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS: $(inherited) -framework ComposeApp
        INFOPLIST_FILE: iosApp/Info.plist
    preBuildScripts:
      - name: Compile Kotlin Framework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/../../.."
          ./gradlew :sample:composeApp:embedAndSignAppleFrameworkForXcode
